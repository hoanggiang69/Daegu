<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gọi Món - POS Daegu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans overflow-hidden">

    <div class="bg-white shadow-sm border-b border-gray-200 px-4 py-3 flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="goBack()" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 active:scale-95 transition text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </button>
            <div>
                <h1 id="table-title" class="text-xl font-bold text-[#0056a3]">Bàn --</h1>
                <p class="text-xs text-gray-500" id="table-status">Đang gọi món...</p>
            </div>
        </div>
        
        <div class="flex items-center gap-3 w-1/2 justify-end">
            <button onclick="openCustomItemModal()" class="px-4 py-2 bg-orange-100 text-orange-600 font-medium rounded-lg hover:bg-orange-200 active:scale-95 transition text-sm flex items-center gap-1 border border-orange-200 whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                Món tùy chọn
            </button>
            <div class="w-2/3">
                <input type="text" placeholder="Tìm tên món..." class="w-full bg-gray-100 border-none rounded-full px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-[#0056a3]/30 transition">
            </div>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        
        <div class="w-[70%] bg-[#f5f5f5] flex flex-col border-r border-gray-200">
            <div class="flex gap-2 p-4 overflow-x-auto shrink-0 bg-white shadow-sm hide-scrollbar">
                <button class="px-5 py-2 rounded-full text-sm font-medium bg-[#0056a3] text-white whitespace-nowrap shadow-sm">Tất cả</button>
                <button class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 whitespace-nowrap">Đồ Nướng</button>
                <button class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 whitespace-nowrap">Lẩu</button>
                <button class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 whitespace-nowrap">Đồ Uống</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div class="grid grid-cols-3 xl:grid-cols-4 gap-4" id="menu-grid"></div>
            </div>
        </div>

        <div class="w-[30%] bg-white flex flex-col shadow-[-4px_0_15px_rgba(0,0,0,0.03)] z-10">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                <h2 class="font-bold text-gray-800 text-base">Hóa đơn tạm tính</h2>
                <button class="text-xs text-red-500 font-medium hover:underline p-1" onclick="clearCart()">Xóa hết</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-2" id="cart-items"></div>
            
            <div class="p-4 border-t border-gray-200 bg-white shrink-0 shadow-[0_-5px_15px_rgba(0,0,0,0.02)] z-20">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-gray-500 text-sm">Tạm tính:</span>
                    <span class="text-gray-800 font-medium" id="cart-subtotal">0 đ</span>
                </div>
                
                <div id="discount-display-row" class="flex justify-between items-center mb-2 hidden">
                    <span class="text-orange-500 text-sm flex items-center gap-1 font-medium">
                        <button onclick="removeDiscount()" class="text-red-500 hover:text-red-700 bg-red-50 rounded-full w-4 h-4 flex items-center justify-center text-[10px]">✖</button> 
                        Giảm giá <span id="discount-label"></span>:
                    </span>
                    <span class="text-orange-500 font-bold" id="discount-amount-display">-0 đ</span>
                </div>

                <hr class="border-gray-100 my-2">

                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-800 font-bold">TỔNG CỘNG:</span>
                    <span class="text-2xl font-bold text-[#0056a3]" id="cart-total">0 đ</span>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="openDiscountModal()" class="w-1/3 py-3 rounded-lg font-bold bg-orange-50 text-orange-600 border border-orange-200 active:bg-orange-100 transition flex items-center justify-center gap-1 text-sm shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                        Giảm giá
                    </button>
                    <button onclick="openPaymentModal()" class="w-2/3 py-3 rounded-lg font-bold bg-[#0056a3] text-white shadow-md active:bg-blue-800 transition text-base flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        THANH TOÁN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="item-option-modal" class="hidden fixed inset-0 bg-black/60 z-[60] flex items-center justify-center">
        <div class="bg-white rounded-xl w-[400px] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50">
                <h3 id="modal-item-name" class="font-bold text-lg text-gray-800 line-clamp-1">Tên món</h3>
                <button onclick="closeItemOptions()" class="text-gray-400 hover:text-red-500 transition p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1">
                <div class="flex items-center justify-between mb-6 bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <span class="font-medium text-gray-700">Số lượng</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeModalQty(-1)" class="w-8 h-8 rounded-full bg-white border border-gray-300 flex items-center justify-center text-lg font-bold text-gray-600 hover:bg-gray-100 active:scale-95">-</button>
                        <span id="modal-item-qty" class="w-6 text-center font-bold text-lg">1</span>
                        <button onclick="changeModalQty(1)" class="w-8 h-8 rounded-full bg-white border border-gray-300 flex items-center justify-center text-lg font-bold text-[#0056a3] hover:bg-blue-50 active:scale-95">+</button>
                    </div>
                </div>

                <div id="modal-topping-section" class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="font-medium text-gray-700 text-sm">Topping / Món thêm</h4>
                        <button onclick="toggleCustomToppingForm()" class="text-xs font-bold text-orange-500 hover:text-orange-600 transition">+ Topping tùy chọn</button>
                    </div>
                    
                    <div id="custom-topping-form" class="hidden flex gap-2 mb-3 bg-orange-50 p-2 rounded-lg border border-orange-200">
                        <input type="text" id="custom-topping-name" placeholder="Tên topping..." class="flex-1 border border-gray-300 rounded px-2 py-1.5 text-sm outline-none focus:border-orange-500">
                        <input type="number" id="custom-topping-price" placeholder="Giá (đ)" class="w-24 border border-gray-300 rounded px-2 py-1.5 text-sm outline-none focus:border-orange-500">
                        <button onclick="addCustomTopping()" class="bg-orange-500 text-white px-3 py-1.5 rounded text-sm font-bold active:bg-orange-600">Thêm</button>
                    </div>

                    <div id="modal-topping-list" class="flex flex-col gap-2"></div>
                </div>

                <div>
                    <h4 class="font-medium text-gray-700 mb-2 text-sm">Ghi chú (Tùy chọn)</h4>
                    <textarea id="modal-item-note" rows="3" placeholder="Ví dụ: Ít cay, không hành..." class="w-full border border-gray-300 rounded-lg p-3 text-sm outline-none focus:border-[#0056a3] focus:ring-1 focus:ring-[#0056a3] resize-none"></textarea>
                </div>
            </div>

            <div class="p-4 border-t border-gray-100 bg-white">
                <button onclick="saveItemToCart()" class="w-full py-3 bg-[#0056a3] text-white rounded-lg font-bold text-base active:bg-blue-800 transition shadow-md flex justify-between px-4">
                    <span>Thêm vào giỏ</span>
                    <span id="modal-temp-total">0 đ</span>
                </button>
            </div>
        </div>
    </div>

    <div id="custom-item-modal" class="hidden fixed inset-0 bg-black/60 z-[60] flex items-center justify-center">
        <div class="bg-white rounded-xl w-[350px] shadow-2xl p-5">
            <h3 class="font-bold text-lg text-gray-800 mb-4 text-center border-b pb-3">Thêm món tùy chọn</h3>
            
            <div class="space-y-3 mb-5">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Tên món *</label>
                    <input type="text" id="custom-name" placeholder="Ví dụ: Phí phục vụ, Bật lửa..." class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-orange-500">
                </div>
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-xs font-medium text-gray-500 mb-1">Giá tiền (đ) *</label>
                        <input type="number" id="custom-price" placeholder="0" class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-orange-500">
                    </div>
                    <div class="w-20">
                        <label class="block text-xs font-medium text-gray-500 mb-1">Số lượng</label>
                        <input type="number" id="custom-qty" value="1" min="1" class="w-full border border-gray-300 rounded p-2 text-sm outline-none text-center focus:border-orange-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Ghi chú</label>
                    <input type="text" id="custom-note" placeholder="Tùy chọn..." class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-orange-500">
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="closeCustomItemModal()" class="flex-1 py-2 bg-gray-100 text-gray-600 rounded font-medium active:bg-gray-200">Hủy</button>
                <button onclick="saveCustomItem()" class="flex-1 py-2 bg-orange-500 text-white rounded font-medium shadow-md active:bg-orange-600">Thêm Món</button>
            </div>
        </div>
    </div>

    <div id="discount-modal" class="hidden fixed inset-0 bg-black/60 z-[70] flex items-center justify-center">
        <div class="bg-white rounded-xl w-[320px] shadow-2xl p-5">
            <h3 class="font-bold text-lg text-gray-800 mb-4 text-center">Giảm giá Hóa đơn</h3>
            
            <div class="flex gap-1 p-1 bg-gray-100 rounded-lg mb-4">
                <button id="btn-discount-percent" onclick="setDiscountType('percent')" class="flex-1 py-1.5 bg-white shadow-sm rounded text-sm font-bold text-[#0056a3] transition-all">% Phần trăm</button>
                <button id="btn-discount-amount" onclick="setDiscountType('amount')" class="flex-1 py-1.5 rounded text-sm font-medium text-gray-500 transition-all">VNĐ Số tiền</button>
            </div>

            <div class="mb-5 relative">
                <input type="number" id="discount-input" placeholder="Nhập số..." class="w-full border border-gray-300 rounded-lg px-3 py-3 text-lg font-bold text-center outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
                <span id="discount-unit" class="absolute right-4 top-3.5 text-gray-400 font-bold">%</span>
            </div>

            <div class="flex gap-2">
                <button onclick="closeDiscountModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-lg font-medium active:bg-gray-200">Hủy</button>
                <button onclick="applyDiscount()" class="flex-1 py-2.5 bg-orange-500 text-white rounded-lg font-bold shadow-md active:bg-orange-600">Áp dụng</button>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="hidden fixed inset-0 bg-black/60 z-[80] flex items-center justify-center">
        <div class="bg-white rounded-xl w-[400px] shadow-2xl overflow-hidden">
            <div class="bg-[#0056a3] p-4 text-center">
                <h3 class="font-bold text-lg text-white opacity-90">Thanh toán Bàn <span id="pay-table-name"></span></h3>
                <p class="text-3xl font-bold text-white mt-1" id="pay-total-amount">0 đ</p>
            </div>
            
            <div class="p-5">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-500 mb-1">Tiền khách đưa (VNĐ)</label>
                    <input type="number" id="pay-customer-cash" oninput="calculateChange()" placeholder="Nhập số tiền..." class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl font-bold text-gray-800 outline-none focus:border-[#0056a3] focus:ring-1 focus:ring-[#0056a3]">
                </div>

                <div class="flex justify-between items-center p-4 bg-gray-50 border border-gray-100 rounded-lg mb-6">
                    <span class="font-medium text-gray-600">Tiền thừa trả khách:</span>
                    <span class="text-xl font-bold text-green-600" id="pay-change-amount">0 đ</span>
                </div>

                <div class="flex gap-3">
                    <button onclick="closePaymentModal()" class="w-1/3 py-3 bg-gray-200 text-gray-700 rounded-lg font-bold active:bg-gray-300">Quay lại</button>
                    <button onclick="confirmPayment()" class="w-2/3 py-3 bg-[#0056a3] text-white rounded-lg font-bold shadow-md active:bg-blue-800 flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                        IN BILL & CHỐT
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="menu.js"></script>
</body>
</html>
